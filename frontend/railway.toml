# Railway deployment config for frontend
# In Railway dashboard: set "Root Directory" to "frontend"
# Add build variable: VITE_API_URL = https://inmo-backend.onrender.com

[build]
builder = "nixpacks"
buildCommand = "npm install && npm run build"

[deploy]
startCommand = "npm run start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
